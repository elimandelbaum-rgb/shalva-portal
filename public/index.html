<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>פורטל עובדים — שלוה</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<script>
(() => {
  const d=document,s=d.createElement("script");
  s.type="module";
  s.src="https://w.behold.so/widget.js";
  d.head.append(s);
})();
</script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Heebo',system-ui,sans-serif}
:root{
  --t:#7B2D8B;--t2:#5C1F6A;--t3:rgba(123,45,139,.07);
  --g:#F4813A;--r:#E84040;--s:#4BAEE8;--pink:#E84393;
  --bd:rgba(123,45,139,.13);--bd2:rgba(123,45,139,.06);
  --tx:#2D0A3A;--tx2:rgba(45,10,58,.65);--tx3:rgba(45,10,58,.4);
  --bg:#F4F0F9;--wh:#fff;
  --rd:12px;--sh:0 2px 16px rgba(123,45,139,.1);
}
body{background:var(--bg);color:var(--tx);overflow:hidden;height:100vh}

/* ── LOGIN ── */
#loginScr{display:none;position:fixed;inset:0;background:linear-gradient(135deg,#3D0A5C 0%,#7B2D8B 50%,#A04DB0 100%);align-items:center;justify-content:center;z-index:999}
#loginScr.on{display:flex}
.lbox{background:#fff;border-radius:20px;padding:36px 32px;width:340px;box-shadow:0 20px 60px rgba(0,0,0,.3);text-align:center}
.llogo{margin-bottom:20px}
.llogo img{height:56px;object-fit:contain}
.llogo-fb{font-size:26px;font-weight:900;color:var(--t)}
.llogo-sub{font-size:9px;color:var(--tx3);margin-top:2px;letter-spacing:.1em}
.lfl{display:block;text-align:right;font-size:11px;font-weight:700;color:var(--tx2);margin-bottom:5px;margin-top:13px}
.lfi{width:100%;padding:10px 13px;border:1.5px solid var(--bd);border-radius:9px;font-size:13px;font-family:inherit;color:var(--tx);outline:none;transition:border .15s}
.lfi:focus{border-color:var(--t)}
.lbtn{width:100%;margin-top:18px;padding:12px;border:none;border-radius:10px;background:linear-gradient(135deg,var(--t2),var(--t));color:#fff;font-size:14px;font-weight:800;font-family:inherit;cursor:pointer;transition:opacity .15s}
.lbtn:hover{opacity:.9}
.lerr{display:none;background:#FFF0F0;color:#C0392B;padding:8px 12px;border-radius:8px;font-size:11px;margin-top:10px;border:1px solid rgba(192,57,43,.2)}
.lerr.on{display:block}
.lhint{margin-top:14px;font-size:9.5px;color:var(--tx3);line-height:1.7;background:#F7F4FA;padding:8px 12px;border-radius:8px}

/* ── SHELL ── */
#shellScr{display:none;height:100vh;flex-direction:row}
#shellScr.on{display:flex}
.sb{width:200px;background:#fff;border-left:1px solid var(--bd);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.sb-head{padding:14px 12px;background:linear-gradient(160deg,var(--t2),var(--t))}
.sb-logo{font-size:12px;font-weight:800;color:#fff;margin-top:5px}
.sb-sub{font-size:7.5px;color:rgba(255,255,255,.7)}
.ngl{padding:10px 12px 3px;font-size:7.5px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.1em}
.ni{display:flex;align-items:center;gap:8px;padding:7px 12px;margin:1px 6px;border-radius:8px;font-size:11px;color:var(--tx2);cursor:pointer;transition:all .13s}
.ni:hover,.ni.on{background:var(--t3);color:var(--t)}
.ni.on{font-weight:700}
.ni .nic{font-size:14px;flex-shrink:0}
.sbf{margin-top:auto;padding:10px;border-top:1px solid var(--bd)}
.ubtn{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:9px;background:var(--t3);margin-bottom:6px}
.uav{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:#fff;flex-shrink:0}
.uname{font-size:10.5px;font-weight:700;color:var(--tx)}
.urole{font-size:8px;color:var(--tx3)}
.logoutbtn{width:100%;padding:7px;border:1px solid var(--bd);border-radius:8px;background:#fff;font-size:10.5px;font-weight:600;color:var(--r);cursor:pointer;font-family:inherit}

/* ── MAIN ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:48px;background:#fff;border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 18px;gap:10px;flex-shrink:0}
#ptitle{font-size:13px;font-weight:800;color:var(--tx);flex:1}
.tib{width:32px;height:32px;border-radius:50%;border:1px solid var(--bd);background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:13px;cursor:pointer;position:relative;transition:background .13s}
.tib:hover{background:var(--t3)}
.nb{position:absolute;top:2px;left:2px;width:8px;height:8px;border-radius:50%;background:var(--r);border:1.5px solid #fff;display:none}
.nb.on{display:block}
.cnt{flex:1;overflow-y:auto;padding:16px}
.cnt::-webkit-scrollbar{width:4px}
.cnt::-webkit-scrollbar-thumb{background:var(--bd);border-radius:999px}

/* ── COMPONENTS ── */
.card{background:#fff;border:1px solid var(--bd);border-radius:var(--rd);padding:14px 16px;margin-bottom:0}
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:11px}
.st{font-size:11.5px;font-weight:800;color:var(--tx)}
.mb{margin-bottom:12px}

/* grids */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.g13{display:grid;grid-template-columns:1.4fr 1fr;gap:12px}
.fr2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fr3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.mwrap{display:grid;gap:10px;margin-bottom:14px}
.m4{grid-template-columns:repeat(4,1fr)}
.m5{grid-template-columns:repeat(5,1fr)}

/* metrics */
.mc{border-radius:11px;padding:12px 13px 14px;background:#fff;border:1px solid var(--bd);position:relative;overflow:hidden}
.mv{font-size:22px;font-weight:900;color:var(--tx);line-height:1}
.ml{font-size:8.5px;color:var(--tx2);margin-top:3px}
.md{font-size:8px;font-weight:700;margin-top:4px}
.mdup{color:#219653}.mddn{color:var(--r)}
.mi{position:absolute;top:10px;left:12px;font-size:20px;opacity:.25}
.mst{position:absolute;bottom:0;left:0;right:0;height:3px;border-radius:0 0 11px 11px}
.mT{background:linear-gradient(90deg,var(--t3),var(--t))}.mG{background:linear-gradient(90deg,rgba(244,129,58,.1),var(--g))}
.mR{background:linear-gradient(90deg,rgba(232,64,64,.1),var(--r))}.mV{background:linear-gradient(90deg,rgba(232,67,147,.1),var(--pink))}
.mS{background:linear-gradient(90deg,rgba(75,174,232,.1),var(--s))}

/* forms */
.fg{margin-bottom:11px}
.fl{display:block;font-size:10.5px;font-weight:700;color:var(--tx2);margin-bottom:4px}
.fi{width:100%;padding:8px 11px;border:1.5px solid var(--bd);border-radius:8px;font-size:12px;font-family:inherit;color:var(--tx);outline:none;transition:border .13s;background:#fff}
.fi:focus{border-color:var(--t)}
.fta{width:100%;padding:9px 11px;border:1.5px solid var(--bd);border-radius:8px;font-size:12px;font-family:inherit;color:var(--tx);outline:none;resize:vertical;min-height:80px;transition:border .13s}
.fta:focus{border-color:var(--t)}
.fta.tall{min-height:120px}
.fsel{width:100%;padding:8px 11px;border:1.5px solid var(--bd);border-radius:8px;font-size:12px;font-family:inherit;color:var(--tx);outline:none;background:#fff}

/* buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:9px;font-size:11px;font-weight:700;font-family:inherit;cursor:pointer;border:none;transition:all .13s;text-decoration:none}
.bnt{background:linear-gradient(135deg,var(--t2),var(--t));color:#fff}
.bnt:hover{opacity:.88}
.bno{background:#fff;border:1.5px solid var(--bd);color:var(--tx2)}
.bno:hover{background:var(--t3);border-color:var(--t);color:var(--t)}
.bng{background:linear-gradient(135deg,#219653,#27AE60);color:#fff}
.bnr{background:linear-gradient(135deg,#C0392B,var(--r));color:#fff}
.bnsm{font-size:9.5px;padding:5px 11px}
.ab{padding:4px 10px;border-radius:6px;font-size:9px;font-weight:700;cursor:pointer;border:none;font-family:inherit}
.abv{background:var(--t3);color:var(--t)}
.abr{background:rgba(232,64,64,.1);color:var(--r)}
.abg{background:rgba(33,150,83,.1);color:#219653}

/* badges */
.b{display:inline-flex;align-items:center;font-size:8.5px;font-weight:700;padding:2px 8px;border-radius:999px}
.bt{background:rgba(39,174,96,.12);color:#219653}
.br{background:rgba(232,64,64,.12);color:#C0392B}
.bg2{background:rgba(244,129,58,.12);color:#8A3D0A}
.bs{background:rgba(75,174,232,.12);color:#1565C0}
.bv{background:rgba(123,45,139,.1);color:var(--t2)}
.bgr{background:rgba(45,10,58,.07);color:var(--tx2)}

/* table */
.tbl{width:100%;border-collapse:collapse;font-size:10.5px}
.tbl th{background:var(--bg);padding:7px 10px;font-size:9px;font-weight:700;color:var(--tx3);text-align:right;border-bottom:1px solid var(--bd)}
.tbl td{padding:8px 10px;border-bottom:1px solid var(--bd2);color:var(--tx)}
.tbl tr:hover td{background:var(--t3);cursor:pointer}
.mn{font-size:9px;color:var(--tx3)}

/* misc */
.ldg{text-align:center;padding:24px;color:var(--tx3);font-size:11px}
.info-box{padding:9px 12px;background:rgba(75,174,232,.08);border:1px solid rgba(75,174,232,.2);border-radius:8px;font-size:10px;color:#1565C0;margin-bottom:11px}
.warn-box{padding:9px 12px;background:rgba(244,129,58,.08);border:1px solid rgba(244,129,58,.2);border-radius:8px;font-size:10px;color:#8A3D0A;margin-bottom:11px}
.suc-box{padding:9px 12px;background:rgba(39,174,96,.08);border:1px solid rgba(39,174,96,.2);border-radius:8px;font-size:10px;color:#219653;margin-bottom:11px}
.sep{border:none;border-top:1px solid var(--bd);margin:16px 0}
.row{display:flex;align-items:center;gap:9px;padding:8px 0;border-bottom:1px solid var(--bd2)}
.row:last-child{border-bottom:none}
.pb{height:5px;background:var(--bg);border-radius:999px;overflow:hidden}
.pf{height:100%;border-radius:999px;transition:width .4s}
.pT{background:var(--t)}.pG{background:#27AE60}.pR{background:var(--r)}.pV{background:var(--pink)}

/* tabs */
.tabs2{display:flex;gap:4px;margin-bottom:13px;border-bottom:2px solid var(--bd);padding-bottom:0}
.tab2{padding:7px 13px;font-size:10.5px;font-weight:700;color:var(--tx3);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;white-space:nowrap;transition:all .13s}
.tab2:hover{color:var(--t)}
.tab2.on{color:var(--t);border-bottom-color:var(--t)}
.tbp{display:none}.tbp.on{display:block}

/* modal */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(45,10,58,.45);z-index:200;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px)}
.modal-bg.on{display:flex}
.modal{background:#fff;border-radius:16px;padding:22px 24px;width:100%;max-width:540px;max-height:85vh;overflow-y:auto;position:relative}
.modal.sm{max-width:400px}
.modal.lg{max-width:700px}
.mt{font-size:14px;font-weight:800;color:var(--tx);margin-bottom:4px}
.ms2{font-size:10px;color:var(--tx3);margin-bottom:14px}
.mc-x{position:absolute;top:14px;left:16px;width:26px;height:26px;border-radius:50%;background:var(--bg);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:11px;color:var(--tx3)}

/* toast */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#2D0A3A;color:#fff;padding:10px 20px;border-radius:999px;font-size:11px;font-weight:600;z-index:9999;display:none;white-space:nowrap;box-shadow:0 8px 24px rgba(0,0,0,.3)}
.toast.ok{background:linear-gradient(135deg,#219653,#27AE60)}
.toast.err{background:linear-gradient(135deg,#C0392B,var(--r))}

/* hero */
.hero{background:linear-gradient(135deg,#4A1560,var(--t),#9B3FA8);border-radius:14px;padding:16px 20px;color:#fff;display:flex;align-items:center;gap:16px;margin-bottom:12px}
.hero-txt{flex:1}
.hero-name{font-size:19px;font-weight:900;line-height:1.1}
.hero-sub{font-size:9.5px;opacity:.8;margin-top:2px}
.hero-date{margin-top:8px;display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,.2);border-radius:999px;padding:3px 11px;font-size:8.5px}
.wbox{background:rgba(255,255,255,.18);border-radius:10px;padding:10px 14px;text-align:center;flex-shrink:0}
.wt{font-size:22px;font-weight:900}
.wd{font-size:8px;opacity:.8;margin-top:1px}

/* approval flow */
.flow{display:flex;align-items:center;background:var(--bg);border-radius:9px;padding:10px 14px;margin-bottom:13px;border:1px solid var(--bd)}
.flow-step{display:flex;flex-direction:column;align-items:center;flex:1;text-align:center}
.flow-dot{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;margin:0 auto 3px}
.flow-lb{font-size:7.5px;color:var(--tx3)}
.flow-line{flex:0 0 14px;height:2px;background:#D0C4E0;margin-bottom:14px}

/* color picker */
.cp-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.cp{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .13s}
.cp:hover,.cp.on{transform:scale(1.25);border-color:#fff;box-shadow:0 0 0 2px var(--t)}

/* notification panel */
.npnl{position:absolute;top:44px;left:0;width:280px;background:#fff;border:1px solid var(--bd);border-radius:12px;box-shadow:var(--sh);z-index:100;display:none;max-height:340px;overflow-y:auto}
.npnl.on{display:block}
#notifBtn{position:relative}

/* mobile */
@media(max-width:768px){
  .sb{display:none!important}
  #mobileNav{display:flex!important;position:fixed;bottom:0;left:0;right:0;height:58px;background:#fff;border-top:1px solid var(--bd);z-index:300;box-shadow:0 -4px 20px rgba(123,45,139,.1);justify-content:space-around;align-items:center;padding:0 4px}
  .mn-btn{display:flex;flex-direction:column;align-items:center;gap:2px;padding:5px 8px;border-radius:9px;cursor:pointer;border:none;background:transparent;font-family:inherit;min-width:44px}
  .mn-btn.on{background:var(--t3)}
  .mn-btn .mn-ic{font-size:19px}
  .mn-btn .mn-lb{font-size:8px;font-weight:600;color:var(--tx3)}
  .mn-btn.on .mn-lb{color:var(--t)}
  #mobileMenuBtn{display:flex!important;position:fixed;top:8px;right:10px;width:36px;height:36px;border-radius:50%;background:var(--t3);border:1px solid var(--bd);align-items:center;justify-content:center;font-size:16px;cursor:pointer;z-index:400}
  #mobileDrawer{display:block!important;position:fixed;inset:0;z-index:500;pointer-events:none;opacity:0;transition:opacity .22s}
  #mobileDrawer.open{pointer-events:all;opacity:1}
  .drawer-bg{position:absolute;inset:0;background:rgba(61,31,74,.5);backdrop-filter:blur(3px)}
  .drawer-panel{position:absolute;top:0;right:0;width:240px;height:100%;background:#fff;overflow-y:auto;transform:translateX(100%);transition:transform .25s cubic-bezier(.4,0,.2,1);box-shadow:-8px 0 32px rgba(123,45,139,.2)}
  #mobileDrawer.open .drawer-panel{transform:translateX(0)}
  .drawer-ni{display:flex;align-items:center;gap:10px;padding:12px 14px;font-size:13px;color:var(--tx2);cursor:pointer;border-bottom:1px solid var(--bd);transition:background .12s}
  .drawer-ni:hover{background:var(--t3);color:var(--t)}
  .main{height:calc(100vh - 58px)}
  .topbar{padding:0 48px 0 12px}
  .tsrch{display:none!important}
  .m4,.m5{grid-template-columns:repeat(2,1fr)!important}
  .g2,.g3,.g13{grid-template-columns:1fr!important}
  .fr2,.fr3{grid-template-columns:1fr!important}
  .hero{flex-direction:column;text-align:center}
  .tabs2{overflow-x:auto;flex-wrap:nowrap!important;padding-bottom:2px}
  .tabs2::-webkit-scrollbar{height:0}
  .modal{max-width:100%;border-radius:16px 16px 0 0;max-height:92vh}
  .modal-bg{align-items:flex-end!important;padding:0!important}
  #frmDeptGrid{grid-template-columns:repeat(2,1fr)!important}
}
@media(min-width:769px){
  #mobileNav,#mobileMenuBtn,#mobileDrawer{display:none!important}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScr" class="on">
  <div class="lbox">
    <div class="llogo">
      <img src="/logo.png" onerror="this.style.display='none';document.getElementById('lfb').style.display='block'"/>
      <div id="lfb" style="display:none"><div class="llogo-fb">שלוה</div><div class="llogo-sub">EMPLOYEE PORTAL · המרכז הלאומי</div></div>
    </div>
    <div class="lerr" id="lerr">שם משתמש או סיסמה שגויים</div>
    <label class="lfl">שם משתמש</label>
    <input class="lfi" id="lun" placeholder="הכנס שם משתמש..." autocomplete="username"/>
    <label class="lfl">סיסמה</label>
    <input class="lfi" id="lpw" type="password" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()"/>
    <button class="lbtn" onclick="doLogin()">כניסה לפורטל ←</button>
    <div class="lhint">
      עובד: <b>מיכל</b> / 1234 &nbsp;·&nbsp; <b>שרה</b> / 1234<br>
      מנהל מחלקה: <b>יוסי</b> / 1234<br>
      HR: <b>רות</b> / 1234<br>
      מנהל ראשי: <b>admin</b> / admin123
    </div>
  </div>
</div>

<!-- SHELL -->
<div id="shellScr">
  <!-- סיידבר -->
  <aside class="sb" id="sidebar">
    <div class="sb-head">
      <img src="/logo.png" style="height:32px;object-fit:contain;background:transparent" onerror="this.style.display='none'"/>
      <div class="sb-logo">שלוה</div>
      <div class="sb-sub">נותנים תקווה. משנים חיים.</div>
    </div>
    <div id="sideNav"></div>
    <div class="sbf">
      <div class="ubtn" id="userBtn">
        <div class="uav" id="userAv" style="background:var(--t)">?</div>
        <div><div class="uname" id="userName">...</div><div class="urole" id="userRole"></div></div>
      </div>
      <button class="logoutbtn" onclick="doLogout()">🚪 יציאה</button>
    </div>
  </aside>

  <!-- תוכן ראשי -->
  <div class="main">
    <div class="topbar">
      <div id="ptitle">דף הבית</div>
      <div style="display:flex;align-items:center;gap:5px;font-size:10px;color:var(--tx3);background:var(--bg);border:1px solid var(--bd);border-radius:999px;padding:5px 11px" class="tsrch">🔍 חיפוש...</div>
      <div class="tib" id="notifBtn" onclick="toggleNotif()">🔔<div class="nb" id="notifDot"></div>
        <div class="npnl" id="nd" onclick="event.stopPropagation()">
          <div style="padding:10px 13px;font-size:10.5px;font-weight:700;border-bottom:1px solid var(--bd)">התראות</div>
          <div id="notifList"><div class="ldg">אין התראות</div></div>
        </div>
      </div>
    </div>
    <div class="cnt" id="mainContent"></div>
  </div>
</div>

<!-- מובייל -->
<div id="mobileMenuBtn" style="display:none" onclick="toggleDrawer()">☰</div>
<div id="mobileDrawer" style="display:none">
  <div class="drawer-bg" onclick="toggleDrawer()"></div>
  <div class="drawer-panel">
    <div style="padding:14px;background:linear-gradient(135deg,var(--t2),var(--t))">
      <div style="font-size:12px;font-weight:800;color:#fff">שלוה — פורטל עובדים</div>
    </div>
    <div id="drawerItems"></div>
  </div>
</div>
<div id="mobileNav" style="display:none"></div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- מודל כללי -->
<div class="modal-bg" id="reqModal">
  <div class="modal lg">
    <div class="mc-x" onclick="closeM('reqModal')">✕</div>
    <div class="mt" id="rmTitle"></div>
    <div id="rmBody"></div>
  </div>
</div>

<script>
// ══════════════════════════════════════
// STATE
// ══════════════════════════════════════
let ME = null;
let _reqs = [];

// ══════════════════════════════════════
// API
// ══════════════════════════════════════
const API = {
  async req(method, path, body) {
    const r = await fetch('/api' + path, {
      method, credentials: 'include',
      headers: body ? {'Content-Type':'application/json'} : {},
      body: body ? JSON.stringify(body) : undefined
    });
    if (!r.ok) { const e = await r.json().catch(()=>({})); throw new Error(e.error||r.status); }
    return r.json();
  },
  get: (p) => API.req('GET', p),
  post: (p, b) => API.req('POST', p, b),
  put: (p, b) => API.req('PUT', p, b),
  delete: (p) => API.req('DELETE', p)
};

async function doLogin() {

let _newsCache = {};
async function loadNews() { await switchNews('ynet', document.getElementById('btn-ynet')); }

async function switchNews(src, btn) {
  ['ynet','a7','all'].forEach(s=>{
    const b=document.getElementById('btn-'+s);
    if (!b) return;
    b.className = 'btn bnsm ' + (s===src?'bnt':'bno');
  });
  const nb=document.getElementById('newsBody'), nt=document.getElementById('newsTime');
  const nm=document.getElementById('newsMainTitle'), nmm=document.getElementById('newsMainMeta');
  if (!nb) return;
  nb.innerHTML='<div class="ldg">⟳</div>';

  const fetch1 = async (s) => {
    if (_newsCache[s]) return _newsCache[s];
    try {
      const urls={ynet:'https://www.ynet.co.il/Integration/StoryRss2.xml',a7:'https://www.inn.co.il/Rss.aspx'};
      const r=await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(urls[s])}`);
      const d=await r.json();
      if (d.items?.length) { _newsCache[s]=d.items.map(i=>({...i,src:s})); return _newsCache[s]; }
    } catch(e) {}
    return [];
  };

  try {
    let items = src==='all'
      ? [...(await fetch1('ynet')).slice(0,5),...(await fetch1('a7')).slice(0,5)].sort((a,b)=>new Date(b.pubDate)-new Date(a.pubDate))
      : (await fetch1(src)).map(i=>({...i,src}));

    if (!items.length) throw new Error('empty');

    if (nt) nt.textContent = (src==='ynet'?'ynet':src==='a7'?'ערוץ 7':'ynet+ערוץ7') + ' · ' + new Date().toLocaleTimeString('he-IL',{hour:'2-digit',minute:'2-digit'});

    const first = items[0];
    window._newsFirstLink = first.link;
    if (nm) nm.textContent = first.title;
    if (nmm) {
      const isYnet = first.src==='ynet';
      nmm.innerHTML = `<span style="background:${isYnet?'#FDECEA':'#E8F0FE'};color:${isYnet?'#C0392B':'#1565C0'};padding:1px 6px;border-radius:999px;font-size:7.5px;font-weight:700">${isYnet?'ynet':'ערוץ 7'}</span> <span>${new Date(first.pubDate).toLocaleTimeString('he-IL',{hour:'2-digit',minute:'2-digit'})}</span>`;
    }
    if (first.thumbnail) {
      const img = document.getElementById('newsMainImg');
      if (img) { img.style.backgroundImage=`url(${first.thumbnail})`;img.style.backgroundSize='cover';img.style.backgroundPosition='center';img.innerHTML=''; }
    }

    nb.innerHTML = items.slice(1,6).map((item,i)=>`
    <a href="${item.link}" target="_blank" style="text-decoration:none;display:flex;align-items:flex-start;gap:7px;padding:6px 0;border-bottom:1px solid var(--bd2);transition:background .12s" onmouseover="this.style.background='var(--t3)'" onmouseout="this.style.background='transparent'">
      <div style="font-size:10px;font-weight:800;color:rgba(123,45,139,.25);flex-shrink:0;width:14px;margin-top:1px">${i+2}</div>
      <div style="flex:1">
        <div style="font-size:9.5px;font-weight:700;color:var(--tx);line-height:1.4">${item.title}</div>
        <div style="display:flex;gap:4px;margin-top:2px">
          <span style="background:${item.src==='ynet'?'#FDECEA':'#E8F0FE'};color:${item.src==='ynet'?'#C0392B':'#1565C0'};padding:1px 5px;border-radius:999px;font-size:7px;font-weight:700">${item.src==='ynet'?'ynet':'ערוץ 7'}</span>
          <span style="font-size:7.5px;color:var(--tx3)">${new Date(item.pubDate).toLocaleTimeString('he-IL',{hour:'2-digit',minute:'2-digit'})}</span>

async function pgChat(cnt) {
  cnt.innerHTML = `
<div class="card" style="height:calc(100vh - 160px);display:flex;flex-direction:column">
  <div class="sh"><span class="st">🤖 שלומית — עוזרת AI</span></div>

    <button class="btn bnt" onclick="sendChat()">שלח →</button>
  </div>
</div>`;
  addChatMsg('bot', `שלום ${ME.name}! 👋 אני שלומית, העוזרת הדיגיטלית של שלוה. איך אוכל לעזור לך היום?`);

function addChatMsg(who, text) {
  const msgs = document.getElementById('chatMsgs');
  if (!msgs) return;
  const isBot = who==='bot';
  const div = document.createElement('div');
  div.style.cssText = `display:flex;gap:8px;align-items:flex-end;${isBot?'':'flex-direction:row-reverse'}`;
  div.innerHTML = `
  <div style="width:28px;height:28px;border-radius:50%;background:${isBot?'var(--t)':'#4BAEE8'};display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0">${isBot?'🤖':'👤'}</div>
  <div style="max-width:70%;padding:10px 13px;border-radius:12px;background:${isBot?'#F7F4FA':'linear-gradient(135deg,var(--t2),var(--t))'};color:${isBot?'var(--tx)':'#fff'};font-size:11px;line-height:1.6;border:${isBot?'1px solid var(--bd)':'none'}">${text}</div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

async function sendChat() {
  const inp = document.getElementById('chatIn');
  const text = inp?.value.trim();
  if (!text) return;
  inp.value = '';
  addChatMsg('user', text);
  const thinking = document.createElement('div');
  thinking.innerHTML = `<div style="display:flex;gap:8px;align-items:center"><div style="width:28px;height:28px;border-radius:50%;background:var(--t);display:flex;align-items:center;justify-content:center;font-size:11px">🤖</div><div style="padding:10px 13px;background:#F7F4FA;border-radius:12px;font-size:11px;color:var(--tx3);border:1px solid var(--bd)">⟳ חושבת...</div></div>`;
  document.getElementById('chatMsgs')?.appendChild(thinking);
  try {
    const r = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        model:'claude-sonnet-4-20250514', max_tokens:500,
        system:`אתה שלומית, עוזרת AI של המרכז הלאומי שלוה בירושלים. עוזרת לעובדים בנושאי HR, נהלים, וכל שאלה. עונה בעברית, קצר וממוקד. המשתמש הוא ${ME.name}, ${ME.title||''}.`,
        messages:[{role:'user',content:text}]
      })
    });
    const d = await r.json();
    thinking.remove();
    addChatMsg('bot', d.content?.[0]?.text || 'מצטערת, לא הצלחתי לעבד את הבקשה.');
  } catch(e) {
    thinking.remove();
    addChatMsg('bot', 'מצטערת, אני לא זמינה כרגע. נסה שוב מאוחר יותר.');
  }
}

function showFrmDept(id) {
  document.getElementById('frmDeptGrid').style.display='none';
  document.getElementById('frmDeptCnt').style.display='block';
  const dept=window._frmDepts?.[id];
  if (!dept) return;
  document.getElementById('frmDeptTitle').textContent=dept.title;
  const tabs=document.getElementById('frmSubTabs');
  const cnt=document.getElementById('frmSubCnt');
  tabs.innerHTML=dept.tabs.map((t,i)=>`<div class="tab2 ${i===0?'on':''}" onclick="swFrmTab(this,'${t.id}')">${t.lb}</div>`).join('');
  cnt.innerHTML=dept.tabs.map((t,i)=>`<div class="tbp ${i===0?'on':''}" id="${t.id}">${t.html}</div>`).join('');
  if (id==='fc2') setTimeout(loadEquipHist,100);
}

function swFrmTab(btn,tid) {
  btn.closest('.tabs2').querySelectorAll('.tab2').forEach(t=>t.classList.remove('on'));
  btn.classList.add('on');
  document.querySelectorAll('#frmSubCnt .tbp').forEach(t=>t.classList.remove('on'));
  document.getElementById(tid)?.classList.add('on');
}

async function subForm(type, data, label) {
  const copy=document.getElementById('frm_copy')?.value||'';
  const deptMap={vacation:'HR',sick:'HR',accident:'HR',eval:'HR',referral:'HR',salary_raise:'שכר',reserves:'שכר',conditions:'HR',vacation_leave:'HR',it_issue:'מחשוב',maintenance:'תחזוקה',photography:'שיווק',video:'שיווק',campaign:'שיווק',secretary:'מזכירות',room_booking:'מזכירות',ceo:'לשכת מנכ"ל',innovation:'הנהלה',security_req:'ביטחון',security_incident:'ביטחון',welfare:'רווחה',event:'רווחה'};
  try {
    const res=await API.post('/requests',{
      type,dept:deptMap[type]||'כללי',
      subject:label+' — '+Object.values(data).filter(Boolean).join(', ').substring(0,60),
      details:JSON.stringify(data),
      priority:'normal',copy_email:copy,
      steps:JSON.stringify(['עובד','מנהל','מחלקה'])
    });
    toast(`✅ ${label} #${res.id} נשלח!`);
    document.getElementById('frm_copy').value='';
  } catch(e){toast('שגיאה בשליחה',false);}
}

async function saveUser(id) {
  const data={
    name:document.getElementById('u_name')?.value,
    username:document.getElementById('u_un')?.value,
    role:document.getElementById('u_role')?.value,
    dept:document.getElementById('u_dept')?.value,
    title:document.getElementById('u_title')?.value,
    email:document.getElementById('u_email')?.value,
    phone:document.getElementById('u_phone')?.value,
    vacation_days:parseInt(document.getElementById('u_vac')?.value)||16,
    sick_days:parseInt(document.getElementById('u_sick')?.value)||10,
    reserve_days:parseInt(document.getElementById('u_res')?.value)||0,
    hire_date:document.getElementById('u_hire')?.value,
    color:document.getElementById('u_color')?.value,
  };
  const pw=document.getElementById('u_pw')?.value;
  if (pw) data.password=pw;
  if (!data.name||!data.username){toast('שם ושם משתמש חובה',false);return;}
  if (id) await API.put(`/users/${id}`,data);
  else await API.post('/users',data);
  toast(id?'עובד עודכן!':'עובד נוסף!');
  closeM('userModal');
  navigate('aemp');
}

async function deactivateUser(id,name) {

  await API.delete(`/users/${id}`);
  toast(`${name} בוטל`);
  navigate('aemp');
}
